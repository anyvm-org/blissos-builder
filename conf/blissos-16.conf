

# BlissOS 16 (Android-x86 derivative, Android 13 userland) FOSS Generic x86_64.
# FOSS = no GApps -> no Google setup wizard, lighter, cleaner base.
VM_ISO_LINK="https://downloads.sourceforge.net/project/blissos-x86/Official/BlissOS16/FOSS/Generic/Bliss-v16.9.7-x86_64-OFFICIAL-foss-20241011.iso"
VM_OS_NAME="blissos"
VM_OS_TYPE="generic"
VM_RELEASE=16
VM_SSH_PORT=2222

# virtio disk (default) + virtio-net: both empirically verified with BlissOS.
VM_NIC=virtio

# std VGA (bochs-drm). With KMS enabled in the kernel cmdline (see
# hooks/offline-construct.sh: NO `nomodeset`) plus HWACCEL=0 (software GLES),
# BlissOS renders its desktop to the VNC console. The build itself is headless
# over ssh; the GUI is a bonus for runtime users.
VM_VGA=std

# The guest is CPU-saturated during first boot (software rendering), so give
# the ssh probe more headroom than the 10s default.
VM_SSH_READY_TIMEOUT=60

# toybox: `reboot -p` powers the VM off (Android has no `shutdown` command).
VM_SHUTDOWN_CMD="reboot -p"

# Intentionally unset: VM_ROOT_PASSWORD / VM_INSTALL_CMD / VM_PRE_INSTALL_PKGS /
# VM_RSYNC_PKG / VM_SSHFS_PKG / VM_OPTS. Android has no package manager usable
# over plain ssh, and ssh access is pre-baked by hooks/offline-construct.sh, so
# all of those pipeline stages must skip.
